<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago - Panini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --panini-blue: #0052a3;
            --panini-red: #d32f2f;
            --panini-yellow: #ffd700;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --border-light: #e0e0e0;
        }

        body {
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* HEADER */
        .promo-banner {
            background: var(--panini-red);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        header {
            background: var(--panini-blue);
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0;
            position: absolute;
            left: 10px;
        }

        .menu-btn, .search-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .menu-btn svg, .search-btn svg {
            width: 22px;
            height: 22px;
        }

        .logo {
            height: 28px;
            object-fit: contain;
            margin-left: 15px;
        }

        .back-btn {
            position: absolute;
            left: 10px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
        }

        /* CONTENIDO */
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--panini-blue);
        }

        /* RESUMEN CARRITO */
        .cart-summary {
            background: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
        }

        .cart-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            background: #f5f5f5;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .cart-item-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .cart-item-quantity {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-size: 13px;
            font-weight: 600;
            color: var(--panini-red);
            margin-bottom: 8px;
        }

        .cart-item-delivery {
            font-size: 10px;
            color: var(--text-light);
            padding: 8px;
            background: #f0f8ff;
            border-radius: 3px;
            margin-top: 8px;
        }

        /* RESUMEN TOTALES */
        .totals {
            background: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .total-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .total-row.final {
            font-size: 16px;
            font-weight: 600;
            border-bottom: none;
            color: var(--panini-red);
            margin-top: 10px;
            padding-top: 10px;
        }

        /* METODOS DE PAGO */
        .payment-methods {
            background: white;
            border-radius: 4px;
            padding: 0;
            margin-bottom: 20px;
        }

        .payment-section-title {
            font-size: 13px;
            font-weight: 500;
            padding: 15px;
            background: #f5f5f5;
            border-bottom: 1px solid var(--border-light);
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .payment-option:last-child {
            border-bottom: none;
        }

        .payment-option:hover {
            background: #f9f9f9;
        }

        .payment-option.active {
            background: #e3f2fd;
            border-left: 4px solid var(--panini-blue);
        }

        .payment-icon {
            width: 44px;
            height: 44px;
            margin-right: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: white;
        }

        .payment-icon.tarjeta {
            background: #fff3cd;
        }

        .payment-icon.pse {
            background: #cfe2ff;
        }

        .payment-icon img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .payment-label {
            flex: 1;
        }

        .payment-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .payment-description {
            font-size: 12px;
            color: var(--text-light);
        }

        /* BOTÓN DE PAGO */
        .pay-button {
            width: 100%;
            background: var(--panini-blue);
            color: white;
            border: none;
            padding: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .pay-button:hover:not(:disabled) {
            background: #003d7a;
        }

        .pay-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* VOLVER */
        .back-link {
            text-align: center;
            margin-bottom: 30px;
        }

        .back-link a {
            color: var(--panini-blue);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* FOOTER */
        footer {
            background: var(--panini-blue);
            color: white;
            padding: 20px 15px;
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
        }

        footer a {
            color: var(--panini-yellow);
            text-decoration: none;
        }

        .empty-cart {
            background: white;
            border-radius: 4px;
            padding: 40px 20px;
            text-align: center;
        }

        .empty-cart p {
            color: var(--text-light);
            margin-bottom: 20px;
            font-size: 16px;
        }

        .empty-cart a {
            display: inline-block;
            background: var(--panini-blue);
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--panini-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .delivery-info {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 4px;
            font-size: 11px;
            color: #2e7d32;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }

            .cart-item-image {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- BANNER PROMOCIONAL -->
    <div class="promo-banner">
        <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 6h-2.18c.11-.32.18-.67.18-1a2.996 2.996 0 0 0-5.5-1h-1c-1.1 0-2 .9-2 2 0 .33.07.68.18 1H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/>
        </svg>
        Envío GRATIS en compras superiores a $100.000
    </div>

    <!-- HEADER -->
    <header>
        <button class="back-btn" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </button>
        
        <img src="pani.webp" alt="Panini Logo" class="logo">
    </header>

    <!-- CONTENIDO -->
    <div class="container" id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Cargando tu carrito...</p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 Panini Trading Cards | <a href="#">paninilatina.com</a></p>
        <p style="margin-top: 10px;">Síguenos en redes sociales</p>
    </footer>

    <script>
        // BASE DE DATOS DE CIUDADES Y BARRIOS
        const colombiaCities = {
            bogota: { cities: [{ name: "Bogotá", neighborhoods: ["Usaquén", "Chapinero", "Santa Fe", "San Cristóbal", "Usme", "Tunjuelito", "Bosa", "Kennedy", "Fontibón", "Engativá", "Suba", "Barrios Unidos", "Teusaquillo", "Mártires", "Antonio Nariño", "Puente Aranda", "La Candelaria", "Rafael Uribe Umaña", "Ciudad Bolívar"] }] },
            antioquia: { cities: [{ name: "Medellín", neighborhoods: ["Arví", "Castilla", "Doce de Octubre", "Guayabal", "La Candelaria", "La América", "Laureles-Estadio", "Manrique", "Palmitas", "Popayán", "Robledo", "San Alejo", "San Cristóbal", "San Javier", "Santa Cruz", "Belén"] }, { name: "Bello", neighborhoods: ["Centro", "Altos de San Miguel", "El Rosario", "Guanacas", "La Pajarita", "Portachuelo", "San Miguel", "Villa del Socorro"] }] },
            atlantico: { cities: [{ name: "Barranquilla", neighborhoods: ["Centro", "Abajo", "Arriba", "El Prado", "La Luz", "Los Mártires", "Olaya", "Suroriente", "San Alejo"] }] },
            bolivar: { cities: [{ name: "Cartagena", neighborhoods: ["Centro", "Bocagrande", "Castillogrande", "Laguito", "El Cabrero", "Turística", "San Diego", "Getsemaní"] }] },
            boyaca: { cities: [{ name: "Tunja", neighborhoods: ["Centro", "Limarco", "Jordán", "La Fuente", "Las Acacias", "Porvenir"] }] },
            caldas: { cities: [{ name: "Manizales", neighborhoods: ["Centro", "Arrecife", "Barrio Nuevo", "Cervantes", "Colina", "El Prado", "Guanacas", "La Hormiga"] }] },
            caqueta: { cities: [{ name: "Florencia", neighborhoods: ["Centro", "Barrio Nuevo", "La Arenosa", "San Antonio"] }] },
            cauca: { cities: [{ name: "Popayán", neighborhoods: ["Centro", "Barrio Obrero", "Caleida", "Loma de la Cruz", "San Agustín"] }] },
            cesar: { cities: [{ name: "Valledupar", neighborhoods: ["Centro", "Altos del Rosario", "Bucaramanga", "La Maná", "Los Andes"] }] },
            choco: { cities: [{ name: "Quibdó", neighborhoods: ["Centro", "Barrio Nuevo", "La Loma", "San Isidro"] }] },
            cordoba: { cities: [{ name: "Montería", neighborhoods: ["Centro", "Barrio Nuevo", "Las Gaviotas", "Los Laureles"] }] },
            cundinamarca: { cities: [{ name: "Soacha", neighborhoods: ["Centro", "Altos de Cazucá", "Bavaria", "Compartir", "el Progreso"] }] },
            huila: { cities: [{ name: "Neiva", neighborhoods: ["Centro", "Altos de la Magdalena", "Los Mangos", "San Fernando"] }] },
            la_guajira: { cities: [{ name: "Riohacha", neighborhoods: ["Centro", "Barrio Nuevo", "La Arenosa", "San Antonio"] }] },
            magdalena: { cities: [{ name: "Santa Marta", neighborhoods: ["Centro", "Bastidas", "El Rodadero", "Gaira", "Taganga"] }] },
            meta: { cities: [{ name: "Villavicencio", neighborhoods: ["Centro", "Barrio Nuevo", "Los Laureles", "San Isidro"] }] },
            nariño: { cities: [{ name: "Pasto", neighborhoods: ["Centro", "Barrio Obrero", "las Acacias", "San Juan"] }] },
            norte_santander: { cities: [{ name: "Cúcuta", neighborhoods: ["Centro", "Barrio Obrero", "El Rosario", "La Esperanza"] }] },
            risaralda: { cities: [{ name: "Pereira", neighborhoods: ["Centro", "Alamos", "Bavaria", "Cuba", "Laureles"] }] },
            santander: { cities: [{ name: "Bucaramanga", neighborhoods: ["Centro", "Cabecera", "Centro Comercial", "Fortul", "Gil Hermida", "Miraflores"] }] },
            tolima: { cities: [{ name: "Ibagué", neighborhoods: ["Centro", "Barrio Obrero", "Combeima", "La Estancia"] }] },
            valle: { cities: [{ name: "Cali", neighborhoods: ["Aguablanca", "Alpujarra", "Calvario", "Castilla", "Centro", "Colombiana", "Cubagua", "El Guarda", "El Lili", "Juanchito", "Jorjorillo", "Kennedy", "Menga", "Pance", "Puerto Rellena", "San Alejo", "San Antón"] }] }
        };

        let cartItems = [];
        let selectedPayment = null;

        function loadCart() {
            const savedCart = localStorage.getItem('cartItems');
            
            if (savedCart) {
                try {
                    cartItems = JSON.parse(savedCart);
                    displayCart();
                } catch (e) {
                    console.error('Error al parsear carrito:', e);
                    showEmptyCart();
                }
            } else {
                showEmptyCart();
            }
        }

        function showEmptyCart() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="empty-cart">
                    <p>🛒 Tu carrito está vacío</p>
                    <a href="panini.html">Volver a comprar</a>
                </div>
            `;
        }

        function displayCart() {
            const content = document.getElementById('content');
            
            if (cartItems.length === 0) {
                showEmptyCart();
                return;
            }

            let cartHTML = '<h2 class="section-title">RESUMEN DE COMPRA</h2><div class="cart-summary">';
            let total = 0;

            cartItems.forEach((item) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;

                cartHTML += `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <img src="${item.image}" alt="${item.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2214%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📦%3C/text%3E%3C/svg%3E'">
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-quantity">Cantidad: <strong>${item.quantity}</strong></div>
                            <div class="cart-item-price">$${subtotal.toLocaleString('es-CO')}</div>
                        </div>
                    </div>
                `;
            });

            cartHTML += '</div>';

            const shipping = total >= 100000 ? 0 : 15000;
            const totalWithShipping = total + shipping;

            cartHTML += `
                <div class="totals">
                    <div class="total-row">
                        <span>Subtotal:</span>
                        <span>$${total.toLocaleString('es-CO')}</span>
                    </div>
                    <div class="total-row">
                        <span>Envío:</span>
                        <span>${shipping === 0 ? '✅ Gratis' : '$' + shipping.toLocaleString('es-CO')}</span>
                    </div>
                    <div class="total-row final">
                        <span>TOTAL A PAGAR:</span>
                        <span>$${totalWithShipping.toLocaleString('es-CO')}</span>
                    </div>
                </div>

                <h2 class="section-title">DIRECCIÓN DE ENTREGA</h2>
                <div style="background: white; border-radius: 4px; padding: 15px; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Nombre*</label>
                            <input type="text" id="fullName" placeholder="Ej: Juan Pérez" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                        </div>
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Teléfono*</label>
                            <input type="tel" id="phone" placeholder="Ej: 3001234567" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Correo*</label>
                        <input type="email" id="email" placeholder="Ej: correo@ejemplo.com" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Departamento*</label>
                            <select id="department" onchange="updateCities()" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                                <option value="">Seleccionar</option>
                                <option value="bogota">Bogotá D.C.</option>
                                <option value="antioquia">Antioquia</option>
                                <option value="atlantico">Atlántico</option>
                                <option value="bolivar">Bolívar</option>
                                <option value="boyaca">Boyacá</option>
                                <option value="caldas">Caldas</option>
                                <option value="caqueta">Caquetá</option>
                                <option value="cauca">Cauca</option>
                                <option value="cesar">Cesar</option>
                                <option value="choco">Chocó</option>
                                <option value="cordoba">Córdoba</option>
                                <option value="cundinamarca">Cundinamarca</option>
                                <option value="huila">Huila</option>
                                <option value="la_guajira">La Guajira</option>
                                <option value="magdalena">Magdalena</option>
                                <option value="meta">Meta</option>
                                <option value="nariño">Nariño</option>
                                <option value="norte_santander">Norte de Santander</option>
                                <option value="risaralda">Risaralda</option>
                                <option value="santander">Santander</option>
                                <option value="tolima">Tolima</option>
                                <option value="valle">Valle del Cauca</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Ciudad*</label>
                            <select id="city" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                                <option value="">Seleccionar</option>
                            </select>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Barrio*</label>
                        <select id="neighborhood" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                            <option value="">Seleccionar</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Dirección*</label>
                        <input type="text" id="address" placeholder="Ej: Calle 45 #23-67" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Código Postal</label>
                            <input type="text" id="zipcode" placeholder="110111" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                        </div>
                        <div>
                            <label style="font-size: 12px; font-weight: 500; margin-bottom: 6px; display: block;">Instrucciones</label>
                            <input type="text" id="instructions" placeholder="Portería" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 13px;">
                        </div>
                    </div>
                </div>
            `;

            cartHTML += `
                <h2 class="section-title">¿CÓMO QUIERES PAGAR?</h2>
                <div class="payment-methods">
                    <div class="payment-section-title">Selecciona tu método de pago</div>
                    
                    <div class="payment-option" onclick="selectPayment('tarjeta', this)">
                        <div class="payment-icon tarjeta">
                            <img src="tarjeta.png" alt="Tarjeta">
                        </div>
                        <div class="payment-label">
                            <div class="payment-title">Tarjeta de Crédito/Débito</div>
                            <div class="payment-description">Visa, Mastercard, Amex</div>
                        </div>
                    </div>

                    <div class="payment-option" onclick="selectPayment('pse', this)">
                        <div class="payment-icon pse">
                            <img src="pse.png" alt="PSE">
                        </div>
                        <div class="payment-label">
                            <div class="payment-title">PSE (Transferencia Bancaria)</div>
                            <div class="payment-description">Acreditación inmediata desde tu banco</div>
                        </div>
                    </div>
                </div>

                <button class="pay-button" id="payBtn" onclick="continuePay()" disabled>
                    SELECCIONA UN MÉTODO
                </button>

                <div class="back-link">
                    <a href="index.html">← Volver al catálogo</a>
                </div>
            `;

            content.innerHTML = cartHTML;
        }

        function updateCities() {
            const dept = document.getElementById('department').value;
            const citySelect = document.getElementById('city');
            const neighborhoodSelect = document.getElementById('neighborhood');

            citySelect.innerHTML = '<option value="">Seleccionar</option>';
            neighborhoodSelect.innerHTML = '<option value="">Seleccionar</option>';

            if (dept && colombiaCities[dept]) {
                const cities = colombiaCities[dept].cities;
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.name;
                    option.textContent = city.name;
                    citySelect.appendChild(option);
                });

                citySelect.addEventListener('change', updateNeighborhoods);
            }
        }

        function updateNeighborhoods() {
            const dept = document.getElementById('department').value;
            const city = document.getElementById('city').value;
            const neighborhoodSelect = document.getElementById('neighborhood');

            neighborhoodSelect.innerHTML = '<option value="">Seleccionar</option>';

            if (dept && city && colombiaCities[dept]) {
                const cities = colombiaCities[dept].cities;
                const selectedCity = cities.find(c => c.name === city);

                if (selectedCity) {
                    selectedCity.neighborhoods.forEach(neighborhood => {
                        const option = document.createElement('option');
                        option.value = neighborhood;
                        option.textContent = neighborhood;
                        neighborhoodSelect.appendChild(option);
                    });
                }
            }
        }

        function selectPayment(method, element) {
            selectedPayment = method;
            
            const options = document.querySelectorAll('.payment-option');
            options.forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');

            const payBtn = document.getElementById('payBtn');
            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = total >= 100000 ? 0 : 15000;
            const totalWithShipping = total + shipping;

            payBtn.disabled = false;
            
            const methodNames = {
                'tarjeta': 'PAGAR CON TARJETA',
                'pse': 'PAGAR CON PSE'
            };
            
            payBtn.textContent = `${methodNames[method]} • $${totalWithShipping.toLocaleString('es-CO')}`;
        }

        function continuePay() {
            if (!selectedPayment) {
                alert('Por favor selecciona un método de pago');
                return;
            }

            const paymentInfo = {
                items: cartItems,
                method: selectedPayment,
                date: new Date().toISOString(),
                orderId: 'ORD-' + Date.now(),
                delivery: {
                    fullName: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    department: document.getElementById('department').value,
                    city: document.getElementById('city').value,
                    neighborhood: document.getElementById('neighborhood').value,
                    address: document.getElementById('address').value,
                    zipcode: document.getElementById('zipcode').value,
                    instructions: document.getElementById('instructions').value
                }
            };

            localStorage.setItem('paymentInfo', JSON.stringify(paymentInfo));

            if (selectedPayment === 'tarjeta') {
                window.location.href = 'tarjetas.html';
            } else if (selectedPayment === 'pse') {
                window.location.href = 'pasarela/pse.html';
            }
        }

        function goBack() {
            window.history.back();
        }

        window.addEventListener('DOMContentLoaded', function() {
            loadCart();
        });
    </script>
</body>
</html>
